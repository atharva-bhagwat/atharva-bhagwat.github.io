---
layout: default
---

<div class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.header_image %}
    <img src="{{ page.header_image }}" alt="header image" class="post-header-img">
  {% endif %}
</div>

<time datetime="{{ page.date | date: "%B %-d, %Y" }}" class="post-date">
  {{ page.date | date: "%B %-d, %Y" }}
</time>

{{ content }}
