---
layout: default
---

<div class="post-header">
  <div class="post-title-group">
    <h1 class="post-title">{{ page.title }}</h1>
    <time datetime="{{ page.date | date: "%B %-d, %Y" }}" class="post-date">
      {{ page.date | date: "%B %-d, %Y" }}
    </time>
  </div>

  {% if page.header_image %}
  <img src="{{ page.header_image }}" alt="" class="post-header-image" />
  {% endif %}
</div>

{{ content }}
